projects:
  - name: "FocusFarm"
    tagline: "Android productivity game"
    description: >
      A gamified focus timer where staying off your phone grows your farm.
      Built with React Native and Expo — fully offline, no backend required.
    tags: ["React Native", Expo, TypeScript, Zustand, Android]
    badge: "Android"
    github: "https://github.com/cokee96/focusfarm"

  - name: "bot-recetas"
    tagline: "Telegram shopping list + AI recipes"
    description: >
      A Telegram bot that manages your shopping list and suggests recipes powered
      by DeepSeek AI. Includes a companion web interface for tracking ingredients.
    tags: [n8n, "Telegram Bot API", "DeepSeek AI", JavaScript]
    badge: "Telegram Bot"
    github: "https://github.com/cokee96/bot-recetas"

  - name: "terraform-azure-modules"
    tagline: "Production-grade Terraform module library for Azure"
    description: >
      17 composable Terraform modules covering the full Azure cloud-native stack:
      VNet, AKS, ACR, Key Vault, SQL, Redis, Cosmos DB, Service Bus, Event Hub,
      App Service, Functions, Storage, NSG, Private Endpoints and more.
      Includes a live/ environment layer (dev/pre/prod), CI/CD pipelines for
      GitHub Actions, Azure DevOps and Jenkins with plan-before-approve gates,
      and OIDC authentication — no long-lived secrets.
    tags: [Terraform, Azure, AKS, IaC, "GitHub Actions", "Azure DevOps", Jenkins]
    badge: "IaC"
    github: "https://github.com/cokee96/terraform-azure-modules"

  - name: "kubernetes-modules"
    tagline: "Terraform modules and pipelines for Kubernetes & on-premise"
    description: >
      14 Terraform modules for Kubernetes resources (Deployment, Service, Ingress,
      ConfigMap, Secret, HPA, StatefulSet, CronJob, NetworkPolicy, Helm Release…)
      with full environment parameterisation. Includes Ansible playbooks for
      on-premise VM deployments and CI/CD pipelines for GitHub Actions, Azure DevOps
      and Jenkins — both for on-premise Kubernetes clusters (kubeconfig-based) and
      bare-metal servers via Ansible/SSH.
    tags: [Kubernetes, Terraform, Ansible, "GitHub Actions", "Azure DevOps", Jenkins, IaC]
    badge: "IaC"
    github: "https://github.com/cokee96/kubernetes-modules"

  - name: "observability-stack"
    tagline: "GitOps observability platform with ArgoCD, Prometheus and Loki"
    description: >
      Production-ready observability stack deployed via GitOps: ArgoCD manages itself
      and all components using the App of Apps pattern. Includes kube-prometheus-stack
      (Prometheus, Alertmanager, Grafana), Loki for log aggregation, 3 pre-built
      Grafana dashboards (cluster overview, node exporter, golden signals), and 13
      alert rules covering pods, nodes, deployments and application SLOs.
      Parameterised for dev/pre/prod with CI/CD pipelines for GitHub Actions,
      Azure DevOps and Jenkins.
    tags: [ArgoCD, Prometheus, Grafana, Loki, Kubernetes, GitOps, Alertmanager, Helm]
    badge: "GitOps"
    github: "https://github.com/cokee96/observability-stack"

  - name: "demo-app"
    tagline: "Instrumented microservice for observability demos"
    description: >
      Minimal Node.js HTTP service that exposes Prometheus metrics (/metrics),
      a health endpoint (/healthz) and simulates realistic latency.
      Deployed on Kubernetes with a ServiceMonitor so Prometheus scrapes it
      automatically — used to drive the golden-signals dashboard and alert rules
      in the observability-stack.
    tags: [Node.js, Kubernetes, Prometheus, Docker, GitOps, ArgoCD]
    badge: "Demo"
    github: "https://github.com/cokee96/demo-app"

  - name: "vault-secrets"
    tagline: "Secrets management with HashiCorp Vault and External Secrets Operator"
    description: >
      Production-grade secrets management on Kubernetes: HashiCorp Vault stores
      credentials centrally with fine-grained access policies. External Secrets
      Operator syncs secrets from Vault into native Kubernetes Secrets automatically.
      Deployed via GitOps with ArgoCD — any secret updated in Vault propagates to
      the cluster within 60 seconds, with zero application changes required.
    tags: [Vault, "External Secrets", Kubernetes, GitOps, ArgoCD, Security]
    badge: "Security"
    github: "https://github.com/cokee96/vault-secrets"

  - name: "backstage-idp"
    tagline: "Internal Developer Platform with Backstage"
    description: >
      Self-hosted Internal Developer Portal built with CNCF Backstage. Provides a
      unified catalog of all services, GitHub-integrated software templates that
      scaffold new microservices (repo + k8s manifests + ArgoCD app in one click),
      and live visibility into Kubernetes pods and ArgoCD sync status. Deployed
      on Kubernetes via GitOps — PostgreSQL persistence, guest auth for local dev.
    tags: [Backstage, IDP, Kubernetes, GitOps, ArgoCD, "Developer Experience"]
    badge: "Platform Engineering"
    github: "https://github.com/cokee96/backstage-idp"

  - name: "devsecops-pipeline"
    tagline: "Shift-left security pipeline with image signing and admission control"
    description: >
      End-to-end DevSecOps pipeline that enforces security at every stage:
      Gitleaks detects leaked secrets before build, Semgrep runs SAST on the source,
      Trivy scans the container image for CVEs (fails on CRITICAL), Cosign signs
      the image keylessly via Sigstore/Rekor, and Kyverno policies on the cluster
      reject any Pod running an unsigned image or missing resource limits.
      Zero secrets stored — signing uses GitHub Actions OIDC with ephemeral keys.
    tags: [DevSecOps, "GitHub Actions", Trivy, Cosign, Kyverno, Sigstore, "Supply Chain Security"]
    badge: "Security"
    github: "https://github.com/cokee96/devsecops-pipeline"

